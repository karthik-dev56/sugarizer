<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Circuit Builder Activity</title>
  <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, viewport-fit=cover"/>
  <link rel="stylesheet" media="not screen and (device-width: 1200px) and (device-height: 900px)"
    href="lib/sugar-web/graphics/css/sugar-96dpi.css">
  <link rel="stylesheet" media="screen and (device-width: 1200px) and (device-height: 900px)"
    href="lib/sugar-web/graphics/css/sugar-200dpi.css">
  <link rel="stylesheet" href="css/activity.css">
  <script data-main="js/loader" src="lib/require.js"></script>
  <script type="text/javascript" src="../../cordova.js"></script>
</head>

<body>
  <!-- Main toolbar -->
  <div id="main-toolbar" class="toolbar">
    <button class="toolbutton" id="activity-button" title="Circuit Builder"></button>
    <div class="seprator-line"></div>
    <button class="toolbutton" id="prev-button" title="Previous Level"></button>
    <span id="level-label" class="level-text">Level 1</span>
    <button class="toolbutton" id="next-button" title="Next Level"></button>
    <div class="seprator-line"></div>
    <button class="toolbutton" id="reset-button" title="Reset"></button>
    <button class="toolbutton" id="check-button" title="Check Circuit"></button>
    <button class="toolbutton pull-right" id="stop-button" title="Stop"></button>
    <button class="toolbutton pull-right" id="fullscreen-button" title="Fullscreen"></button>
    <button class="toolbutton pull-right" id="help-button" title="Help"></button>
  </div>

  <!-- Canvas area -->
  <div id="canvas">
    <div id="level-info">
      <span id="level-description"></span>
      <span id="wire-count"></span>
    </div>
    <canvas id="circuit-canvas"></canvas>
    <div id="message-overlay" class="hidden">
      <div id="message-box">
        <div id="message-icon"></div>
        <div id="message-text"></div>
        <button id="message-btn"></button>
      </div>
    </div>
  </div>

  <button class="toolbutton pull-right" id="unfullscreen-button" title="Unfullscreen"></button>
</body>

</html>
