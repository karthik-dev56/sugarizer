<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd" [
  <!ENTITY fill_color "#FFFFFF">
  <!ENTITY stroke_color "#010101">
]>
<svg xmlns="http://www.w3.org/2000/svg" width="55" height="55" viewBox="0 0 55 55">
  <!-- Dots -->
  <circle cx="10" cy="10" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="27.5" cy="10" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="45" cy="10" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="10" cy="27.5" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="27.5" cy="27.5" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="45" cy="27.5" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="10" cy="45" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="27.5" cy="45" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="45" cy="45" r="3.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <!-- Connected lines forming a shape -->
  <polyline points="10,10 27.5,10 45,27.5 27.5,45 10,27.5 10,10" fill="none" stroke="&stroke_color;" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fill the shape -->
  <polygon points="10,10 27.5,10 45,27.5 27.5,45 10,27.5" fill="&fill_color;" fill-opacity="0.3" stroke="none"/>
</svg>
